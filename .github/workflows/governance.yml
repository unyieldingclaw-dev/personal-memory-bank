name: Governance

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  file-size:
    name: File Size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Check file sizes
        shell: bash
        run: |
          FAIL=0

          echo "=== memory-bank files (warn: 80, fail: 150) ==="
          while IFS= read -r -d '' file; do
            lines=$(wc -l < "$file")
            if [ "$lines" -gt 150 ]; then
              echo "FAIL: $file ($lines lines -- limit 150)"
              FAIL=1
            elif [ "$lines" -gt 80 ]; then
              echo "WARN: $file ($lines lines -- warn 80)"
            else
              echo "OK:   $file ($lines lines)"
            fi
          done < <(find memory-bank -name "*.md" -print0 2>/dev/null)

          echo ""
          echo "=== all other markdown files (warn: 500, fail: 800) ==="
          while IFS= read -r -d '' file; do
            lines=$(wc -l < "$file")
            if [ "$lines" -gt 800 ]; then
              echo "FAIL: $file ($lines lines -- limit 800)"
              FAIL=1
            elif [ "$lines" -gt 500 ]; then
              echo "WARN: $file ($lines lines -- warn 500)"
            fi
          done < <(find . -name "*.md" \
            -not -path "./memory-bank/*" \
            -not -path "./.git/*" \
            -not -path "./.claude/worktrees/*" \
            -not -path "./docs/superpowers/plans/*" \
            -print0)

          echo ""
          [ "$FAIL" -eq 0 ] && echo "file-size: PASS" || echo "file-size: FAIL"
          exit $FAIL

  forbidden-patterns:
    name: Forbidden Patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Credential grep
        shell: bash
        run: |
          if git grep -P -i '(password|api_key|token|secret)\s*=\s*[A-Za-z0-9]{8,}' \
            -- ':(exclude).gitleaks.toml' ':(exclude).gitignore'; then
            echo "FAIL: Literal credential assignment found above"
            exit 1
          fi
          echo "OK: No literal credential assignments found"

      - name: Spec placeholder grep
        shell: bash
        run: |
          # Exclude *ci-governance* specs: they document the CI pattern itself
          # and necessarily reference the placeholder markers in prose.
          FOUND=$(find docs/superpowers/specs -name "*.md" \
            -not -name "*ci-governance*" \
            -print0 \
            | xargs -0 grep -lE '\bTBD\b|\bTODO\b' 2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "FAIL: placeholder markers found in spec files:"
            echo "$FOUND"
            exit 1
          fi
          echo "OK: No placeholder markers in spec files"

      - name: Shellcheck
        shell: bash
        run: |
          # Build directory list from those that actually exist
          SHELL_DIRS=()
          [ -d scripts ] && SHELL_DIRS+=(scripts)
          [ -d templates/scripts ] && SHELL_DIRS+=(templates/scripts)
          if [ "${#SHELL_DIRS[@]}" -gt 0 ]; then
            find "${SHELL_DIRS[@]}" -name "*.sh" -print0 \
              | xargs -r -0 shellcheck --severity=error
          fi
          echo "OK: Shellcheck passed"

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      # gitleaks-action v2.3.9 still uses node20; no Node 24 release exists yet.
      # FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 silences the deprecation warning until upstream ships a fix.
      - uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  template-integrity:
    name: Template Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Validate hook scripts referenced in templates/.claude/settings.json exist in templates/scripts/
        shell: bash
        run: |
          FAIL=0
          SETTINGS="templates/.claude/settings.json"
          BASEPATHS=$(grep '"command":' "$SETTINGS" \
            | grep -oE '[A-Za-z][A-Za-z0-9_/-]*\.(sh|ps1)' \
            | sed 's/\.[^.]*$//' \
            | sort -u)
          for base in $BASEPATHS; do
            if [ -n "$(compgen -G "templates/${base}.*" 2>/dev/null)" ]; then
              echo "OK:   templates/${base}.* present"
            else
              echo "ERROR: $SETTINGS references $base but the script is missing from templates/:"
              printf  "       Expected: templates/%s.sh\n" "$base"
              printf  "       Expected: templates/%s.ps1\n" "$base"
              FAIL=1
            fi
          done
          [ "$FAIL" -eq 0 ] && echo "template-integrity: PASS" || echo "template-integrity: FAIL"
          exit $FAIL
